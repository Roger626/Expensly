<main class="container">
  <div class="card">

    <!-- Ilustración -->
    <div class="illustration" aria-hidden="true">
      <div class="circle circle--outer"></div>
      <div class="circle circle--inner"></div>
      <span class="code-label">404</span>
    </div>

    <!-- Contenido -->
    <header class="card-header">
      <div class="icon-wrap" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01
                   M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <h1>Página no encontrada</h1>
      <p class="subtitle">
        La ruta que buscas no existe o fue movida.<br>
        Regresa al inicio y continúa gestionando tus gastos.
      </p>
    </header>

    <!-- Acciones -->
    <div class="actions">
      <a [routerLink]="['/auth/login']" class="btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2
                   m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2
                   a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Volver al inicio
      </a>
    </div>
  </div>
</main>
