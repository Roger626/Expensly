@if (visible) {
  <!-- Backdrop -->
  <div class="modal-backdrop" (click)="onBackdropClick()" aria-modal="true" role="dialog">

    <!-- Panel — stopPropagation para que el clic interior no cierre -->
    <div
      class="modal-panel modal-panel--{{ size }}"
      (click)="$event.stopPropagation()"
    >
      <!-- Accent stripe -->
      <div class="modal-stripe modal-stripe--{{ variant }}"></div>

      <!-- ── Header ────────────────────────────────────────────────── -->
      <div class="modal-header">

        <!-- Icono: se puede sobreescribir con [modal-icon] -->
        <div class="modal-icon modal-icon--{{ variant }}">
          <ng-content select="[modal-icon]">
            <!-- Icono por defecto según variante -->
            @switch (variant) {
              @case ('success') {
                <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
                  <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.6"/>
                  <polyline points="6.5 10 9 12.5 13.5 7.5" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              }
              @case ('danger') {
                <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
                  <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.6"/>
                  <path d="M7 7l6 6M13 7l-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              }
              @case ('warning') {
                <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
                  <path d="M9.13 3.5 2.5 15.5h15L11.87 3.5a1 1 0 0 0-1.74 0Z"
                    stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                  <line x1="10" y1="8.5" x2="10" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <circle cx="10" cy="14.5" r="0.8" fill="currentColor"/>
                </svg>
              }
              @case ('info') {
                <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
                  <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.6"/>
                  <line x1="10" y1="6.5" x2="10" y2="10.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <circle cx="10" cy="13.5" r="0.85" fill="currentColor"/>
                </svg>
              }
              @default {
                <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
                  <circle cx="10" cy="7" r="3" stroke="currentColor" stroke-width="1.6"/>
                  <path d="M3 17c0-3.31 3.13-6 7-6s7 2.69 7 6"
                    stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
              }
            }
          </ng-content>
        </div>

        <div class="modal-header-text">
          <h2 class="modal-title">{{ title }}</h2>
          @if (subtitle) {
            <p class="modal-subtitle">{{ subtitle }}</p>
          }
        </div>

        <button class="modal-close" (click)="close()" aria-label="Cerrar modal">
          <svg viewBox="0 0 20 20" fill="none" width="15" height="15">
            <path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <!-- ── Body ──────────────────────────────────────────────────── -->
      <div class="modal-body">
        <ng-content select="[modal-body]"></ng-content>
      </div>

      <!-- ── Footer ────────────────────────────────────────────────── -->
      <div class="modal-footer">
        <ng-content select="[modal-footer]"></ng-content>
      </div>

    </div>
  </div>
}
