<nav class="sidebar_layout" [class.is-collapsed]="isCollapsed">
  
  <div class="nav-logo">
    <div class="logo-group">
      <div class="logo-icon">E</div>
      <span class="logo-text" *ngIf="!isCollapsed">Expensly</span>
    </div>
    
    <button class="toggle-btn" (click)="toggleSidebar()" [title]="isCollapsed ? 'Expandir' : 'Colapsar'">
      <lucide-icon [name]="isCollapsed ? 'chevron-right' : 'chevron-left'"></lucide-icon>
    </button>
  </div>

  <ul class="nav-links">
    <li>
      <a routerLink="/admin/facturas" routerLinkActive="clase-activa" [routerLinkActiveOptions]="{exact: true}">
        <lucide-icon name="file-text" class="icon"></lucide-icon>
        <span class="text" *ngIf="!isCollapsed">Facturas</span>
      </a>
    </li>
    <li>
      <a routerLink="/admin/facturas/crear" routerLinkActive="clase-activa">
        <lucide-icon name="plus-circle" class="icon"></lucide-icon>
        <span class="text" *ngIf="!isCollapsed">Nueva Factura</span>
      </a>
    </li>
    <li>
      <a routerLink="/admin/usuarios" routerLinkActive="clase-activa">
        <lucide-icon name="users" class="icon"></lucide-icon>
        <span class="text" *ngIf="!isCollapsed">Usuarios</span>
      </a>
    </li>
    <li>
      <a routerLink="/admin/categorias" routerLinkActive="clase-activa">
        <lucide-icon name="layout-grid" class="icon"></lucide-icon>
        <span class="text" *ngIf="!isCollapsed">Categorías</span>
      </a>
    </li>
  </ul>

  <div class="user-logout">
    <button (click)="onLogout()">
      <lucide-icon name="log-out" class="icon"></lucide-icon>
      <span class="text" *ngIf="!isCollapsed">Cerrar Sesión</span>
    </button>
  </div>
</nav>
