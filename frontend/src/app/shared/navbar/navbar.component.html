<nav class="navbar-layout">

  <div class="logo">
    <a routerLink="/">Expensly</a>
  </div>

  <ul class="nav-links">
    <li>
      <a routerLink="/facturas" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        Ver Facturas
      </a>
    </li>
    <li>
      <a routerLink="/facturas/crear" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        Registrar Factura
      </a>
    </li>
  </ul>

  <div class="navbar-user">
    @if (userName) {
      <span class="user-name">{{ userName }}</span>
    }
    <button class="btn-logout" (click)="onLogout()" title="Cerrar sesión">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span>Salir</span>
    </button>
  </div>

</nav>
