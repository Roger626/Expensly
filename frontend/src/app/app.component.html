<app-navbar *ngIf="isfacturaRoute" (logout)="onLogout()"></app-navbar>
<app-sidebar *ngIf="isAdminRoute"
             (logout)="onLogout()"
             (collapsedChange)="isSidebarCollapsed = $event">
</app-sidebar>

<main
  [class.with-sidebar]="isAdminRoute"
  [class.sidebar-collapsed]="isAdminRoute && isSidebarCollapsed"
  [class.with-navbar]="isfacturaRoute">
    <router-outlet/>
</main>

<!-- Toast notifications — renderizado fuera del flujo de la página -->
<app-toast />
