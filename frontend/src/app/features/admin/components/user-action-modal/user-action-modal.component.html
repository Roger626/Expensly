<app-modal
  [visible]="visible && !!usuario"
  [title]="titulo"
  [subtitle]="subtitulo"
  [variant]="modalVariant"
  size="sm"
  (closed)="onCerrar()">

  <!-- Body -->
  <div modal-body>
    @if (mode === 'cambiar-rol') {
      <div class="form-group">
        <label class="form-label">Nuevo rol</label>
        <div class="select-wrapper">
          <svg class="input-icon" viewBox="0 0 20 20" fill="none" width="14" height="14">
            <circle cx="10" cy="7" r="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M3 17c0-3.31 3.13-6 7-6s7 2.69 7 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <select class="form-select" [(ngModel)]="rolSeleccionado">
            @for (r of roles; track r) {
              <option [value]="r">{{ r }}</option>
            }
          </select>
          <svg class="select-arrow" viewBox="0 0 16 16" fill="none" width="13" height="13">
            <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    }

    @if (mode === 'eliminar' && usuario) {
      <div class="confirm-warn">
        <svg viewBox="0 0 20 20" fill="none" width="22" height="22" style="flex-shrink:0">
          <circle cx="10" cy="10" r="8" stroke="#f59e0b" stroke-width="1.5"/>
          <path d="M10 6v5" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
          <circle cx="10" cy="14" r="1" fill="#f59e0b"/>
        </svg>
        <p>
          Estás a punto de <strong>eliminar permanentemente</strong> a
          <strong>{{ usuario.nombre }}</strong>.<br>
          Esta acción no se puede deshacer.
        </p>
      </div>
    }
  </div>

  <!-- Footer -->
  <ng-container modal-footer>
    <button class="modal-btn modal-btn--ghost" (click)="onCerrar()">Cancelar</button>
    <button
      class="modal-btn"
      [class.modal-btn--primary]="mode === 'cambiar-rol'"
      [class.modal-btn--danger]="mode === 'eliminar'"
      [disabled]="mode === 'cambiar-rol' && !rolSeleccionado"
      (click)="onConfirmar()"
    >
      {{ mode === 'eliminar' ? 'Sí, eliminar' : 'Guardar cambio' }}
    </button>
  </ng-container>

</app-modal>
