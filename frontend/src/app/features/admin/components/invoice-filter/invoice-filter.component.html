<div class="filter-bar">

  <!-- ── Search ──────────────────────────────────────────────────────────── -->
  <div class="filter-group search-group">
    <span class="group-label">BUSCAR IDENTIFICADOR</span>
    <div class="input-wrapper">
      <svg class="input-icon" viewBox="0 0 20 20" fill="none">
        <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.6"/>
        <path d="M13 13l3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <input
        class="text-input"
        type="text"
        [(ngModel)]="searchTerm"
        (input)="onSearchInput()"
        placeholder="Buscar por CUFE, proveedor o empleado…"
      />
      @if (searchTerm) {
        <button class="input-clear" (click)="searchTerm = ''; onSearchInput()">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm3.03 9.97L8 7.94 4.97 10.97l-1-1L7 6.94 3.97 3.97l1-1L8 5.94l3.03-2.97 1 1L9.06 6.94l3.03 3.03-1.06 1z"/></svg>
        </button>
      }
    </div>
  </div>

  <div class="filter-divider"></div>

  <!-- ── Audit Period ────────────────────────────────────────────────────── -->
  <div class="filter-group date-group">
    <span class="group-label">PERÍODO</span>
    <div class="date-range-wrapper">
      <svg class="input-icon" viewBox="0 0 20 20" fill="none">
        <rect x="2" y="4" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.6"/>
        <path d="M6 2v4M14 2v4M2 9h16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <input
        class="date-input"
        type="date"
        [(ngModel)]="dateFrom"
        (change)="onDateChange()"
        title="Desde"
      />
      <span class="date-sep">–</span>
      <input
        class="date-input"
        type="date"
        [(ngModel)]="dateTo"
        (change)="onDateChange()"
        title="Hasta"
      />
    </div>
  </div>

  <div class="filter-divider"></div>

  <!-- ── Categories dropdown ────────────────────────────────────────────── -->
  <div class="filter-group category-group">
    <span class="group-label">CATEGORÍAS</span>
    <div class="category-dropdown-wrapper">
      <button class="dropdown-trigger" (click)="toggleCategoryDropdown()">
        <span class="dropdown-label">{{ categoryLabel }}</span>
        @if (selectedCategories.size > 0) {
          <span class="badge">{{ selectedCategories.size }}</span>
        }
        <svg class="chevron" [class.open]="categoryDropdownOpen" viewBox="0 0 16 16" fill="currentColor">
          <path d="M4 6l4 4 4-4"/>
        </svg>
      </button>

      @if (categoryDropdownOpen) {
        <div class="dropdown-panel">
          @if (categories.length === 0) {
            <span class="dropdown-empty">Sin categorías disponibles</span>
          }
          @for (cat of categories; track cat) {
            <label class="dropdown-item">
              <input
                type="checkbox"
                [checked]="isCategorySelected(cat)"
                (change)="toggleCategory(cat)"
              />
              <span class="item-label">{{ cat }}</span>
            </label>
          }
          @if (selectedCategories.size > 0) {
            <div class="dropdown-footer">
              <button class="btn-clear-cats" (click)="clearCategorySelection()">
                Limpiar selección
              </button>
            </div>
          }
        </div>
      }
    </div>
  </div>

  <!-- ── Filter / Clear button ──────────────────────────────────────────── -->
  <div class="filter-actions">
    <button
      class="btn-filter-icon"
      [class.active]="activeFilterCount > 0"
      (click)="activeFilterCount > 0 ? clearFilters() : null"
      [title]="activeFilterCount > 0 ? 'Limpiar filtros (' + activeFilterCount + ')' : 'Filtros'"
    >
      @if (activeFilterCount > 0) {
        <span class="filter-badge">{{ activeFilterCount }}</span>
      }
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M3 5h14M6 10h8M9 15h2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

</div>
